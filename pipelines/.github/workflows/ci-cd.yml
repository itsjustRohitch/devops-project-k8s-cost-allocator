name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: pip install -r requirements.txt pytest
    - name: Run tests
      env:
        PYTHONPATH: src/main/python
      run: pytest tests/unit/

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker image
      run: docker build -t devops-project-k8s-cost-allocator:latest -f infrastructure/docker/Dockerfile .
    - name: Scan for vulnerabilities
      uses: aquasecurity/trivy-action@0.24.0
      with:
        image-ref: 'devops-project-k8s-cost-allocator:latest'
        format: 'table'
        exit-code: '0'