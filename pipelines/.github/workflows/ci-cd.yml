name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: pip install -r requirements.txt pytest
    - name: Run tests
      run: pytest tests/unit/

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v3
    - name: Build Docker image
      [cite_start]run: docker build -t devops-project-k8s-cost-allocator:latest -f infrastructure/docker/Dockerfile . [cite: 44]
    - name: Scan for vulnerabilities
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'devops-project-k8s-cost-allocator:latest'
        format: 'table'
        exit-code: '0'